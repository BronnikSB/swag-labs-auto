# pytest.ini
[pytest]
minversion = 7.0

# Пути
testpaths = tests
norecursedirs = .git venv __pycache__ node_modules .idea .vscode

# Шаблоны файлов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Параметры по умолчанию
addopts =
    -v
    --tb=short
    --headed
    --strict-markers
    --maxfail=3
    --capture=no
    --showlocals
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure

# Маркеры для ваших тестов
markers =
    # Типы тестов
    smoke: Critical functionality tests
    regression: Full regression test suite
    sanity: Quick sanity checks
    e2e: End-to-end user scenarios

    # Браузеры
    chromium: Run with Chromium browser
    firefox: Run with Firefox browser
    webkit: Run with WebKit browser

    # Функциональность
    auth: Authentication and authorization
    api: API integration tests
    ui: User interface tests
    performance: Performance and load tests
    security: Security tests

    # Состояние
    wip: Work in progress - not stable yet
    flaky: Flaky tests that need investigation
    slow: Slow tests > 30 seconds
    skip_ci: Skip in CI environment

    # Окружение
    dev: Run only in development
    staging: Run only in staging
    prod: Run only in production

# Логирование
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] [%(filename)s:%(lineno)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Дополнительные настройки
xfail_strict = true

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning
    ignore:.*coroutine.*:RuntimeWarning